<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in to the Sarah CLI</title>
<style>
  :root { --bg:#f6f4f0; --card:#fff; --ink:#2b2b33; --muted:#6e6e7a; --line:#e7e7ee; --accent:#5b6ee1; --accent-soft:#e8ebfc; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--ink);
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .card { background:var(--card); border-radius:16px; padding:32px 28px; width:100%; max-width:380px;
    box-shadow:0 8px 32px rgba(40,40,60,.10); text-align:center; }
  .logo { width:64px; height:64px; margin:0 auto 14px; display:block; }
  h1 { font-size:1.3rem; margin-bottom:4px; }
  .sub { color:var(--muted); font-size:0.9rem; margin-bottom:22px; }
  input { width:100%; padding:12px 14px; font-size:1rem; border:1.5px solid var(--line); border-radius:10px; margin-bottom:10px; color:var(--ink); font-family:inherit; }
  input:focus { outline:none; border-color:var(--accent); }
  .btn { width:100%; border:none; border-radius:10px; padding:13px; font-size:1rem; font-weight:600; cursor:pointer; font-family:inherit; }
  .primary { background:var(--accent); color:#fff; } .primary:hover{ filter:brightness(1.08); }
  .google { background:#fff; color:var(--ink); border:1.5px solid var(--line); display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:6px; }
  .google:hover { background:#fafafc; }
  .g-logo { display:inline-grid; place-items:center; width:18px; height:18px; border-radius:50%; background:#fff; border:1px solid var(--line); color:#4285F4; font-weight:800; font-size:0.8rem; }
  .or { display:flex; align-items:center; gap:10px; color:var(--muted); font-size:0.8rem; margin:14px 0; }
  .or::before,.or::after { content:""; flex:1; height:1px; background:var(--line); }
  .toggle { background:none; border:none; color:var(--accent); font-weight:600; cursor:pointer; font-size:0.85rem; margin-top:12px; }
  .toggle:hover { text-decoration:underline; }
  .msg { font-size:0.85rem; min-height:1.2em; margin-top:10px; }
  .msg.err { color:#c25e8a; } .msg.ok { color:#3aa17e; }
  .foot { color:var(--muted); font-size:0.75rem; margin-top:18px; }
</style>
</head>
<body>
<div class="card">
  <svg class="logo" viewBox="0 0 64 64" aria-label="Sarah">
    <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5b6ee1"/><stop offset="1" stop-color="#c25e8a"/></linearGradient></defs>
    <rect width="64" height="64" rx="16" fill="url(#g)"/>
    <path d="M32 46s-13-7.6-13-17.2C19 23 23 20 27 20c2.8 0 4.7 1.6 5 3 .3-1.4 2.2-3 5-3 4 0 8 3 8 8.8C45 38.4 32 46 32 46z" fill="#fff"/>
  </svg>
  <h1>Sign in to Sarah</h1>
  <p class="sub" id="sub">Connect the Sarah CLI to your account.</p>

  <div id="form">
    <button class="btn google" id="google"><span class="g-logo">G</span> Continue with Google</button>
    <div class="or"><span>or use email</span></div>
    <input id="email" type="email" placeholder="you@example.com" autocomplete="username">
    <input id="pw" type="password" placeholder="password" autocomplete="current-password">
    <button class="btn primary" id="go">Sign in</button>
    <button class="toggle" id="toggle">Create an account</button>
    <div class="msg" id="msg"></div>
  </div>

  <p class="foot" id="foot"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = "https://pbevmvhslsdknbmaeenc.supabase.co";
  const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiZXZtdmhzbHNka25ibWFlZW5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNzU5NTgsImV4cCI6MjA5Njk1MTk1OH0.qIMIxSi0C2b74BezDhMttFluPpH6ZOjm1ul3mfEiSZU";
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON, { auth: { detectSessionInUrl: true, persistSession: false } });
  const $ = id => document.getElementById(id);
  const port = new URLSearchParams(location.search).get("port");
  let mode = "signin";

  function setMsg(t, cls){ const m=$("msg"); m.textContent=t; m.className="msg"+(cls?" "+cls:""); }

  // Hand the session back to the waiting CLI on localhost, then show a done state.
  function handBack(session){
    $("form").style.display="none";
    $("sub").textContent="Signed in — returning you to the terminal…";
    setMsg("");
    if(port && session){
      const u = "http://localhost:"+port+"/#access_token="+encodeURIComponent(session.access_token)+
                "&refresh_token="+encodeURIComponent(session.refresh_token||"")+
                "&expires_in="+(session.expires_in||3600);
      $("foot").textContent="You can close this tab.";
      location.replace(u);
    } else {
      $("sub").textContent="Signed in.";
      $("foot").textContent = port ? "Couldn't reach the terminal — try again." : "Open this page from the Sarah CLI ([C] → sign in).";
    }
  }

  // If we returned from Google (or already have a session), forward it.
  sb.auth.getSession().then(({data})=>{ if(data.session) handBack(data.session); });
  sb.auth.onAuthStateChange((_e, session)=>{ if(session) handBack(session); });

  if(!port){ setMsg("Tip: launch this from the Sarah CLI so it can connect.", ""); }

  $("google").onclick = async ()=>{
    setMsg("Redirecting to Google…");
    const { error } = await sb.auth.signInWithOAuth({ provider:"google", options:{ redirectTo: location.href } });
    if(error) setMsg(error.message, "err");
  };
  function setMode(m){ mode=m;
    $("go").textContent = m==="signin"?"Sign in":"Create account";
    $("toggle").textContent = m==="signin"?"Create an account":"I already have an account";
    $("sub").textContent = m==="signin"?"Connect the Sarah CLI to your account.":"Create an account to use with the Sarah CLI.";
    setMsg("");
  }
  $("toggle").onclick = ()=> setMode(mode==="signin"?"signup":"signin");
  $("go").onclick = async ()=>{
    const email=$("email").value.trim(), pw=$("pw").value;
    if(!email||!pw){ setMsg("Enter an email and password.","err"); return; }
    $("go").disabled=true; setMsg("Working…");
    try{
      const { data, error } = mode==="signin"
        ? await sb.auth.signInWithPassword({email,password:pw})
        : await sb.auth.signUp({email,password:pw});
      if(error) throw error;
      if(mode==="signup" && !data.session){ setMsg("Account created — check your email to confirm, then sign in.","ok"); setMode("signin"); $("go").disabled=false; return; }
      // handBack fires via onAuthStateChange
    }catch(err){ setMsg(err.message||"Sign-in failed.","err"); $("go").disabled=false; }
  };
  ["email","pw"].forEach(id=>$(id).addEventListener("keydown",e=>{ if(e.key==="Enter") $("go").click(); }));
</script>
</body>
</html>
